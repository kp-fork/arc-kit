<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8932f"/>
      <stop offset="100%" style="stop-color:#e8c15c"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="5" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="40" y1="0" x2="40" y2="680"/><line x1="80" y1="0" x2="80" y2="680"/><line x1="120" y1="0" x2="120" y2="680"/><line x1="160" y1="0" x2="160" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="240" y1="0" x2="240" y2="680"/><line x1="280" y1="0" x2="280" y2="680"/><line x1="320" y1="0" x2="320" y2="680"/><line x1="360" y1="0" x2="360" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="440" y1="0" x2="440" y2="680"/><line x1="480" y1="0" x2="480" y2="680"/><line x1="520" y1="0" x2="520" y2="680"/><line x1="560" y1="0" x2="560" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="640" y1="0" x2="640" y2="680"/><line x1="680" y1="0" x2="680" y2="680"/><line x1="720" y1="0" x2="720" y2="680"/><line x1="760" y1="0" x2="760" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="840" y1="0" x2="840" y2="680"/><line x1="880" y1="0" x2="880" y2="680"/><line x1="920" y1="0" x2="920" y2="680"/><line x1="960" y1="0" x2="960" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1040" y1="0" x2="1040" y2="680"/><line x1="1080" y1="0" x2="1080" y2="680"/><line x1="1120" y1="0" x2="1120" y2="680"/><line x1="1160" y1="0" x2="1160" y2="680"/></g>
    <g><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="640" x2="1200" y2="640"/></g>
  </g>

  <!-- Top header -->
  <text x="600" y="60" text-anchor="middle" fill="#b1b4b6" font-size="17" letter-spacing="2.5" font-weight="600">NEW IN ARCKIT v5.9.0  ·  UK PROCUREMENT MARKET INTELLIGENCE</text>

  <!-- Motif: awarded-value market-share bar chart showing supplier concentration -->
  <g filter="url(#panelShadow)">
    <rect x="372" y="112" width="456" height="192" rx="12" fill="#14161f" fill-opacity="0.72" stroke="#2a2d3e" stroke-width="1"/>
  </g>
  <text x="398" y="146" fill="#9b9ea3" font-size="15" letter-spacing="1.2" font-weight="600">AWARDED VALUE BY SUPPLIER</text>

  <!-- Bar 1: 62% (dominant incumbent) -->
  <rect x="398" y="168" width="304" height="18" rx="3" fill="#20232e"/>
  <rect x="398" y="168" width="188" height="18" rx="3" fill="url(#goldBar)"/>
  <rect x="596" y="169.5" width="56" height="15" rx="7.5" fill="#3a2a16" stroke="#e8c15c" stroke-width="0.75" stroke-opacity="0.55"/>
  <text x="624" y="181" text-anchor="middle" fill="#e8c15c" font-size="10.5" letter-spacing="1" font-weight="700">HIGH</text>
  <text x="716" y="182" fill="#e8c15c" font-size="15.5" font-weight="700">62%</text>
  <!-- Bar 2: 14% -->
  <rect x="398" y="196" width="304" height="18" rx="3" fill="#20232e"/>
  <rect x="398" y="196" width="43" height="18" rx="3" fill="#7a8896"/>
  <text x="716" y="210" fill="#b1b4b6" font-size="15.5" font-weight="600">14%</text>
  <!-- Bar 3: 9% -->
  <rect x="398" y="224" width="304" height="18" rx="3" fill="#20232e"/>
  <rect x="398" y="224" width="27" height="18" rx="3" fill="#6b7686"/>
  <text x="716" y="238" fill="#b1b4b6" font-size="15.5" font-weight="600">9%</text>
  <!-- Bar 4: 6% -->
  <rect x="398" y="252" width="304" height="18" rx="3" fill="#20232e"/>
  <rect x="398" y="252" width="18" height="18" rx="3" fill="#5c6675"/>
  <text x="716" y="266" fill="#9b9ea3" font-size="15.5" font-weight="600">6%</text>
  <!-- Bar 5: 4% -->
  <rect x="398" y="280" width="304" height="18" rx="3" fill="#20232e"/>
  <rect x="398" y="280" width="12" height="18" rx="3" fill="#505a68"/>
  <text x="716" y="294" fill="#9b9ea3" font-size="15.5" font-weight="600">4%</text>

  <!-- New MCP service callout -->
  <text x="600" y="342" text-anchor="middle" fill="#e8c15c" font-size="18" letter-spacing="2" font-weight="700">POWERED BY THE NEW UK TENDERS MCP</text>
  <text x="600" y="372" text-anchor="middle" fill="#9b9ea3" font-size="16.5" letter-spacing="0.4">Every UK tender notice  ·  677,000 records  ·  five national portals  ·  keyless  ·  OGL v3.0</text>

  <!-- Main title -->
  <text x="600" y="448" text-anchor="middle" fill="#f0f0f0" font-size="60" font-weight="700" letter-spacing="-0.5">Procurement Market Intelligence</text>

  <!-- Subtitle: the two commands -->
  <text x="600" y="492" text-anchor="middle" fill="#f0f0f0" font-size="30" font-weight="400" font-family="'SF Mono', 'Consolas', 'Liberation Mono', monospace">/arckit:tenders    ·    /arckit:competitors</text>

  <!-- Tagline -->
  <text x="600" y="528" text-anchor="middle" fill="#9b9ea3" font-size="19" letter-spacing="0.3">Award-value benchmarks, incumbency and supplier concentration, from real UK contract data</text>

  <!-- Divider -->
  <line x1="180" y1="558" x2="1020" y2="558" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Evidence flow line -->
  <text x="600" y="594" text-anchor="middle" fill="#7a8088" font-size="16.5" font-family="'SF Mono', 'Consolas', 'Liberation Mono', monospace" letter-spacing="0.4">
    new: tenders · competitors      evidence feeds &#8594;  risk · sobc · research · score
  </text>

  <!-- Caveat strip -->
  <text x="600" y="624" text-anchor="middle" fill="#6b7280" font-size="14.5" letter-spacing="0.4">Awarded value is not actual spend. Used for market context and benchmarking, never as a costed figure.</text>

  <!-- Bottom signature -->
  <text x="600" y="664" text-anchor="middle" fill="#505a5f" font-size="13" letter-spacing="2">ARCKIT.ORG  ·  THE ENTERPRISE ARCHITECTURE GOVERNANCE HARNESS</text>
</svg>
