<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c15c"/>
      <stop offset="100%" style="stop-color:#c8932f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="100" y1="0" x2="100" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="300" y1="0" x2="300" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="500" y1="0" x2="500" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="700" y1="0" x2="700" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="900" y1="0" x2="900" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1100" y1="0" x2="1100" y2="680"/></g>
    <g><line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/></g>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="74" text-anchor="middle" fill="#8a8e93" font-size="15" letter-spacing="3.5" font-weight="600">ARCKIT ANALYSIS</text>

  <!-- Headline -->
  <text x="600" y="150" text-anchor="middle" fill="#f0f0f0" font-size="64" font-weight="700" letter-spacing="-0.5">Britain&#8217;s War on Consultants</text>

  <!-- Subline -->
  <text x="600" y="196" text-anchor="middle" fill="#e8c15c" font-size="23" font-weight="600">Declared in 2023. The data shows it didn&#8217;t land until 2025.</text>

  <!-- Chart caption -->
  <text x="600" y="262" text-anchor="middle" fill="#8a8e93" font-size="13.5" letter-spacing="1.6" font-weight="600">CONSULTING AWARDED  &#183;  &#163;BN PER YEAR  &#183;  FRAMEWORK CEILINGS STRIPPED</text>

  <!-- baseline -->
  <line x1="170" y1="580" x2="1030" y2="580" stroke="#2a2d3e" stroke-width="1.25"/>

  <!-- Bars (scale 118, baseline 580; centres 240..960 step120, width 72) -->
  <rect x="204" y="458" width="72" height="122" rx="3" fill="#44505f"/>
  <rect x="324" y="444" width="72" height="136" rx="3" fill="#44505f"/>
  <rect x="444" y="385" width="72" height="195" rx="3" fill="#4d5666"/>
  <rect x="564" y="355" width="72" height="225" rx="3" fill="#4d5666"/>
  <rect x="684" y="319" width="72" height="261" rx="3" fill="#5a6473"/>
  <rect x="804" y="307" width="72" height="273" rx="3" fill="url(#goldBar)"/>
  <rect x="924" y="376" width="72" height="204" rx="3" fill="url(#goldBar)" fill-opacity="0.42" stroke="#e8c15c" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- start anchor label -->
  <text x="240" y="446" text-anchor="middle" fill="#9b9ea3" font-size="17" font-weight="600">&#163;1.0bn</text>

  <!-- peak label -->
  <text x="840" y="294" text-anchor="middle" fill="#e8c15c" font-size="21" font-weight="700">&#163;2.3bn</text>

  <!-- dip label + first fall -->
  <text x="960" y="348" text-anchor="middle" fill="#e8c15c" font-size="13" font-weight="700">first fall, 2025</text>
  <text x="960" y="368" text-anchor="middle" fill="#e8c15c" font-size="19" font-weight="700">&#163;1.7bn</text>

  <!-- year labels -->
  <g fill="#7a8088" font-size="14.5" text-anchor="middle" font-family="'SF Mono','Consolas',monospace">
    <text x="240" y="604">19/20</text>
    <text x="360" y="604">20/21</text>
    <text x="480" y="604">21/22</text>
    <text x="600" y="604">22/23</text>
    <text x="720" y="604">23/24</text>
    <text x="840" y="604">24/25</text>
    <text x="960" y="604">25/26</text>
  </g>

  <!-- Footer -->
  <text x="600" y="656" text-anchor="middle" fill="#6b7280" font-size="14" letter-spacing="1.4">ARCKIT.ORG  &#183;  UK TENDERS MCP  &#183;  AWARDED VALUE IS NOT ACTUAL SPEND</text>
</svg>
